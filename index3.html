<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thời Trang - Chi tiết</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Thời Trang</h1>
  <nav>
    <a href="index.html">Trang chủ</a>
    <a href="index2.html">Đăng nhập</a>
  </nav>
</header>

<main>
  <article id="content"></article>

  <section class="related">
    <h3>Nội dung liên quan</h3>
    <ul id="relatedList"></ul>
  </section>

  <section class="comments">
    <h3>Bình luận</h3>
    <ul id="commentList"></ul>
    <form id="commentForm">
      <input type="text" id="commentName" placeholder="Tên của bạn" required>
      <textarea id="commentText" placeholder="Ý kiến của bạn..." required></textarea>
      <button type="submit">Gửi bình luận</button>
    </form>
  </section>
</main>

<footer>
  <p>Ho Hy Hoang Khang</p>
</footer>

<script src="script.js"></script>
</body>
</html>
